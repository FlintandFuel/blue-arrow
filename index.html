    <script type="application/ld+json">

          "@type": "Question",
          "name": "Do I need an accountant if I am a sole proprietor or freelancer in South Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, and sooner than most people think. As a sole proprietor, your personal and business income are the same thing in SARS eyes. That means provisional tax, annual income tax returns, and potentially VAT all apply to you. Getting the structure right early saves money and stress later."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between provisional tax and income tax in South Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Income tax is what you owe SARS on your earnings for the year. Provisional tax is how self-employed people and businesses pay that debt in advance in two instalments during the year so you are not hit with a massive bill at the end. If you earn non-salary income above a certain threshold, you are required to register as a provisional taxpayer."
          }
        },
        {
          "@type": "Question",
          "name": "When do I need to register for VAT in South Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Registration becomes compulsory once your taxable turnover exceeds R1 million in any 12-month period. You can also register voluntarily once you hit R50,000. Missing the compulsory threshold and not registering carries significant penalties."
          }
        },
        {
          "@type": "Question",
          "name": "How do I register a company with CIPC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CIPC registration itself costs R175 for a private company. The process involves reserving a name, submitting incorporation documents, and registering with SARS for tax and PAYE if you have employees. We handle the full process so you do not have to navigate the CIPC portal yourself."
          }
        },
        {
          "@type": "Question",
          "name": "What documents do I need to give my accountant every month?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typically: your bank statements, any invoices you issued, supplier invoices and receipts, payroll records if you have staff, and a note of any cash transactions. The simpler you keep your records during the month, the less time it takes to process."
          }
        },
        {
          "@type": "Question",
          "name": "What does bookkeeping cost for a small business in South Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For most small businesses and sole proprietors, monthly bookkeeping starts from a few hundred rand for simple records and scales based on transaction volume and complexity. The cost of not having accurate books almost always exceeds the fee."
          }
        },
        {
          "@type": "Question",
          "name": "What is the SARS tax filing season and what are the key deadlines?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The annual filing season typically opens in July and runs through to January for provisional taxpayers. Provisional tax payments fall in August and February. VAT returns are due monthly or bi-monthly depending on your category."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if I am behind on my SARS submissions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It can be fixed. SARS has processes for late submissions and outstanding returns, and while penalties apply, the worst outcome is usually avoided by acting sooner rather than later. We have helped clients get compliant from years behind. The important thing is to start."
          }
        }
